<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>soundboard</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <div class="device-selects">
          <label class="device-select">
            <span>モニター出力</span>
            <select id="monitor-device"></select>
          </label>
          <label class="device-select">
            <span>仮想デバイス出力</span>
            <select id="virtual-device"></select>
          </label>
        </div>
        <div class="toolbar-actions">
          <button id="stop-btn" class="btn btn-danger">停止</button>
          <button id="add-btn" class="btn btn-primary">＋ 音声を追加</button>
        </div>
      </header>

      <div class="mic-bar">
        <label class="device-select">
          <span>マイク入力</span>
          <select id="mic-device"></select>
        </label>
        <button id="mic-toggle" class="btn btn-mic" aria-pressed="false">マイク OFF</button>
        <div class="hotkey-control">
          <span>ホットキー</span>
          <span id="hotkey-display" class="hotkey-display">未設定</span>
          <button id="hotkey-set-btn" class="btn">設定</button>
          <button id="hotkey-clear-btn" class="btn btn-danger" hidden>解除</button>
        </div>
        <label class="volume-control">
          <span>マイク音量</span>
          <input type="range" id="mic-volume" min="0" max="150" step="1" value="100" />
          <span id="mic-volume-value" class="volume-value">100%</span>
        </label>
        <label class="volume-control">
          <span>マスター音量</span>
          <input type="range" id="master-volume" min="0" max="150" step="1" value="100" />
          <span id="master-volume-value" class="volume-value">100%</span>
        </label>
      </div>

      <main>
        <div id="empty-state" class="empty-state" hidden>
          <p>登録された音声がありません。「＋ 音声を追加」から追加してください。</p>
        </div>
        <div id="sound-grid" class="sound-grid"></div>
      </main>

      <div id="status-bar" class="status-bar"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
